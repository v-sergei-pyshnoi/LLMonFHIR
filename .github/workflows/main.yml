name: Metal Toolchain plain vs CodeQL

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
  DERIVED_DATA: .derivedData

jobs:
  plain-build:
    name: Plain xcodebuild
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Metal Toolchain
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          xcodebuild -version
          xcodebuild -downloadComponent MetalToolchain

          echo "=== Verify metal ==="
          xcrun -f metal
          xcrun metal -v

      - name: Resolve package dependencies
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          xcodebuild \
            -project ./LLMonFHIR.xcodeproj \
            -scheme LLMonFHIR \
            -resolvePackageDependencies

      - name: Plain build
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          echo "=== Pre-build checks ==="
          xcode-select -p
          which xcodebuild
          xcrun --find xcodebuild
          xcodebuild -version
          xcrun -f metal
          xcrun metal -v

          xcodebuild \
            -project ./LLMonFHIR.xcodeproj \
            -scheme LLMonFHIR \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS='' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload plain build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plain-build-artifacts
          path: |
            .derivedData
            ~/Library/Logs/DiagnosticReports
          if-no-files-found: ignore

  codeql-build:
    name: CodeQL xcodebuild
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Metal Toolchain
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          xcodebuild -version
          xcodebuild -downloadComponent MetalToolchain

          echo "=== Verify metal ==="
          xcrun -f metal
          xcrun metal -v

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Resolve package dependencies
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          xcodebuild \
            -project ./LLMonFHIR.xcodeproj \
            -scheme LLMonFHIR \
            -resolvePackageDependencies

      - name: CodeQL build
        shell: bash
        run: |
          set -euxo pipefail
          export DEVELOPER_DIR=/Applications/Xcode_26.4.app/Contents/Developer
          sudo xcode-select -s "$DEVELOPER_DIR"

          echo "=== Pre-build checks ==="
          xcode-select -p
          which xcodebuild
          xcrun --find xcodebuild
          xcodebuild -version
          xcrun -f metal
          xcrun metal -v
          env | sort | grep -E 'CODEQL|DEVELOPER_DIR|MD_APPLE|XCODE|DYLD_INSERT_LIBRARIES|SEMMLE' || true

          xcodebuild \
            -project ./LLMonFHIR.xcodeproj \
            -scheme LLMonFHIR \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            build \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS='' \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        if: always()
        uses: github/codeql-action/analyze@v4

      - name: Upload CodeQL build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-build-artifacts
          path: |
            .derivedData
            ~/Library/Logs/DiagnosticReports
          if-no-files-found: ignore
